# Dante (sockd) SOCKS5 server - runs on the RESIDENTIAL (home) machine.
#
# This is the far end of the reverse SSH tunnel. The crawl server reaches it only through the forwarded
# port; it holds no credentials for this machine and cannot open a connection to it by any other route.
#
# The security property this file exists to enforce: the crawl server must be able to reach the public
# internet through this connection, and NOTHING on the home network. Without these rules a reverse SOCKS
# proxy would happily connect to 192.168.x.x, the router, a NAS, or this machine's own SSH port on behalf
# of whoever is on the other end.
#
# Install (Debian/Ubuntu):
#   sudo apt install dante-server
#   sudo cp sockd.conf /etc/danted.conf
#   # set 'external' to this machine's internet-facing interface, then:
#   sudo systemctl enable --now danted
#
# Verify the deny rules actually bite. EVERY one of these must fail (curl exit 97 = the proxy refused it);
# anything that succeeds and returns content means the crawl server can reach into the home network:
#
#   curl --socks5-hostname 127.0.0.1:1080 http://192.168.1.1/     # LAN gateway
#   curl --socks5-hostname 127.0.0.1:1080 http://192.168.2.1/     # LAN gateway
#   curl --socks5-hostname 127.0.0.1:1080 http://192.168.3.1/     # LAN gateway
#   curl --socks5-hostname 127.0.0.1:1080 http://172.16.1.1/      # LAN link
#   curl --socks5-hostname 127.0.0.1:1080 http://172.16.1.2/      # LAN link
#   curl --socks5-hostname 127.0.0.1:1080 http://127.0.0.1:22/    # this machine's own sshd
#
# And the positive control, which MUST succeed - it prints this connection's public IP:
#
#   curl --socks5-hostname 127.0.0.1:1080 https://api.ipify.org
#
# The positive control is not optional. A proxy that refuses everything also passes all six deny checks, so
# without it a total failure looks identical to a working ACL.
#
# scripts/tunnel/check-tunnel.sh runs all of this from the server side (DENY_TARGETS is overridable).

logoutput: syslog

# Listen on loopback only. The ssh -R forward lands here, so nothing else on the home LAN can reach this
# proxy even if the tunnel is down.
internal: 127.0.0.1 port = 1080

# Where outbound connections are sourced from. Change to match this machine:
#
#   ip route get 1.1.1.1
#   -> 1.1.1.1 via 192.168.1.1 dev enp3s0 src 192.168.1.180
#                                  ~~~~~~     ~~~~~~~~~~~~~
#                                  interface  address
#
# Both forms below name the same thing. sockd runs on this machine and has no address of its own, so this
# only selects which of the host's existing addresses it sources outbound connections from:
#
#   external: enp3s0       Use whichever address is on that interface. Preferred: it keeps working if the
#                          address changes.
#
#   external: 192.168.1.180   Pin one address. Only safe if it is static or DHCP-reserved - after a lease
#                             change sockd cannot bind an address the host no longer has, and the tunnel
#                             fails. An IPv4 literal also constrains outbound connections to IPv4, which
#                             matters only if this connection ever gains IPv6 (see README.md, "DNS and
#                             IPv6"). Note that it constrains the socket; whether sockd then picks the A
#                             record for a dual-stack host, rather than failing on the AAAA, is not
#                             verified.
#
# If the host has several addresses on the LAN, any of them works as long as the router routes that subnet:
# each is NATed to the same public IP, so the provider cannot tell them apart. Prefer the one
# 'ip route get' reports as src, since that is the one the kernel already picks. Multiple 'external:' lines
# are supported too, but behind NAT there is no point - they all exit via the same public address.
#
# Either form is a LAN address, not the public one. The router NATs it, and the provider sees the public
# residential IP - which is the entire point of the tunnel.
external: eth0

# No authentication: the only thing that can reach 'internal' is the ssh tunnel, and ssh already
# authenticated. Adding a password here would just put a second credential on the crawl server.
socksmethod: none
clientmethod: none

user.privileged: root
user.unprivileged: nobody

# Who may talk to the proxy at all. Only the tunnel (loopback).
client pass {
    from: 127.0.0.1/32 to: 0.0.0.0/0
    log: error
}

# --- Deny everything that points back into the home network or this machine ---
# Order matters: sockd takes the first matching rule, so these must precede the pass rules below.

socks block {
    from: 0.0.0.0/0 to: 127.0.0.0/8
    log: connect error
}

socks block {
    from: 0.0.0.0/0 to: 10.0.0.0/8
    log: connect error
}

socks block {
    from: 0.0.0.0/0 to: 172.16.0.0/12
    log: connect error
}

socks block {
    from: 0.0.0.0/0 to: 192.168.0.0/16
    log: connect error
}

# Link-local, incl. the cloud metadata address 169.254.169.254.
socks block {
    from: 0.0.0.0/0 to: 169.254.0.0/16
    log: connect error
}

# --- Allow plain web traffic to the public internet ---
# Restricted to the two ports a scraper needs. Anything else (SSH, SMB, databases, ...) is refused by the
# default-deny below, so a compromised crawl server cannot use this as a general-purpose exit.

socks pass {
    from: 127.0.0.1/32 to: 0.0.0.0/0 port = 80
    protocol: tcp
    command: connect
    log: error
}

socks pass {
    from: 127.0.0.1/32 to: 0.0.0.0/0 port = 443
    protocol: tcp
    command: connect
    log: error
}

# Anything not matched above is denied: sockd blocks by default when no rule applies.
